name: CI — Sales Insight Automator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend — lint, test, build
  # ──────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy app/ --ignore-missing-imports

      - name: Build Docker image
        run: docker build -t sales-backend .

  # ──────────────────────────────────────────────
  # Frontend — lint, build
  # ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t sales-frontend .

  # ──────────────────────────────────────────────
  # Docker Compose — integration smoke test
  # ──────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for CI
        run: |
          cat > backend/.env <<'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER=smtp.gmail.com
          SMTP_PORT=587
          SMTP_EMAIL=${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          FRONTEND_URL=http://localhost:5173
          EOF

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo " Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Verify frontend is serving
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173)
          if [ "$status" = "200" ]; then
            echo "Frontend OK (HTTP $status)"
          else
            echo "Frontend failed (HTTP $status)"
            docker compose logs frontend
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
